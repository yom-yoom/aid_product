spring:
  application:
    name: foodaid
  datasource:
    url: jdbc:h2:file:./data/foodaiddb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false
server:
  port: 8080
  forward-headers-strategy: framework
