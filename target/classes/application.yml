server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: foodaid
  datasource:
    url: jdbc:postgresql://localhost:5432/foodaid
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false
  flyway:
    enabled: true
    locations: classpath:db/migration
