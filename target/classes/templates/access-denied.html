<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Доступ ограничен</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: siteHeader(${pageTitle})}"></div>
<main class="page-shell narrow-shell">
    <section class="form-card centered-card">
        <h2>Доступ ограничен</h2>
        <p class="page-muted">Для открытия этой страницы выберите другой профиль в верхней части интерфейса.</p>
        <div class="card-actions centered-actions">
            <a class="btn btn-primary" th:href="@{/}">Вернуться на главную</a>
        </div>
    </section>
</main>
</body>
</html>
