<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Мои доставки</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: siteHeader(${pageTitle})}"></div>
<main class="page-shell">
    <section class="page-head">
        <div>
            <h2>Назначенные доставки</h2>
            <p class="page-muted">Список заявок, переданных волонтёру для выполнения.</p>
        </div>
    </section>

    <section class="table-card">
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>Рацион</th>
                    <th>Получатель</th>
                    <th>Волонтёр</th>
                    <th>Статус</th>
                    <th>Действие</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="delivery : ${deliveries}">
                    <td>
                        <strong th:text="${delivery.helpRequest.ration.name}">Рацион</strong>
                        <div class="muted-line" th:text="${delivery.scheduledAtLabel}">Плановая дата</div>
                    </td>
                    <td>
                        <strong th:text="${delivery.helpRequest.beneficiary.fullName}">ФИО</strong>
                        <div class="muted-line" th:text="${delivery.helpRequest.beneficiary.phone}">Телефон</div>
                        <div class="muted-line" th:text="${delivery.helpRequest.deliveryAddress != null ? delivery.helpRequest.deliveryAddress : delivery.helpRequest.beneficiary.address}">Адрес доставки</div>
                    </td>
                    <td th:text="${delivery.volunteer != null ? delivery.volunteer.fullName : 'Не назначен'}">Волонтёр</td>
                    <td>
                        <span class="status-chip"
                              th:classappend="${delivery.status.name() == 'DONE'} ? ' status-done' : ' status-progress'"
                              th:text="${delivery.status.label}">Статус</span>
                        <div class="muted-line" th:text="${delivery.resultComment}">Комментарий</div>
                    </td>
                    <td>
                        <form class="stack-form" th:if="${delivery.status.name() != 'DONE'}"
                              th:action="@{'/volunteer/deliveries/' + ${delivery.id} + '/complete'}" method="post">
                            <label>Комментарий по результату</label>
                            <input type="text" name="resultComment" placeholder="Например: набор передан лично">
                            <button class="btn btn-primary" type="submit">Отметить как доставленную</button>
                        </form>
                        <span class="status-chip status-done" th:if="${delivery.status.name() == 'DONE'}">Доставка завершена</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
