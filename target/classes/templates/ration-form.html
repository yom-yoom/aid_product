<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Добавление рациона</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: siteHeader(${pageTitle})}"></div>
<main class="page-shell narrow-shell">
    <section class="form-card">
        <div class="page-head compact-head">
            <div>
                <h2>Новый рацион</h2>
                <p class="page-muted">Добавление продуктового набора в каталог.</p>
            </div>
        </div>

        <form th:action="@{/admin/rations}" method="post">
            <div>
                <label for="name">Название</label>
                <input id="name" type="text" name="name" required>
            </div>
            <div class="single-field">
                <label for="description">Описание</label>
                <textarea id="description" name="description" required></textarea>
            </div>
            <div class="card-actions">
                <button class="btn btn-primary" type="submit">Сохранить</button>
                <a class="btn btn-secondary" th:href="@{/rations}">Назад к каталогу</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
