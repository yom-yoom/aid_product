<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Добавление рациона</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: siteHeader(${pageTitle})}"></div>
<main class="container">
    <div class="card">
        <h2 class="section-title">Добавление нового рациона</h2>
        <form th:action="@{/admin/rations}" th:object="${ration}" method="post">
            <div class="form-grid">
                <div>
                    <label for="name">Название</label>
                    <input id="name" type="text" th:field="*{name}">
                    <div class="error" th:errors="*{name}"></div>
                </div>
                <div>
                    <label for="active">Статус</label>
                    <select id="active" th:field="*{active}">
                        <option th:value="true">Активен</option>
                        <option th:value="false">Неактивен</option>
                    </select>
                </div>
            </div>
            <div style="margin-top: 16px;">
                <label for="description">Описание</label>
                <textarea id="description" th:field="*{description}"></textarea>
                <div class="error" th:errors="*{description}"></div>
            </div>
            <div class="actions">
                <button type="submit">Сохранить рацион</button>
                <a class="button" th:href="@{/rations}">К каталогу</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
