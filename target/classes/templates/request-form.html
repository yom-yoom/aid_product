<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Оформление заявки</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: siteHeader(${pageTitle})}"></div>
<main class="page-shell narrow-shell">
    <section class="form-card">
        <div class="page-head compact-head">
            <div>
                <h2>Новая заявка</h2>
                <p class="page-muted">Заполните данные получателя и выберите рацион.</p>
            </div>
        </div>

        <form th:action="@{/requests}" th:object="${requestForm}" method="post">
            <div class="form-grid">
                <div>
                    <label for="fullName">ФИО получателя</label>
                    <input id="fullName" type="text" th:field="*{fullName}">
                    <div class="error" th:errors="*{fullName}"></div>
                </div>
                <div>
                    <label for="phone">Телефон</label>
                    <input id="phone" type="text" th:field="*{phone}">
                    <div class="error" th:errors="*{phone}"></div>
                </div>
                <div>
                    <label for="category">Категория помощи</label>
                    <select id="category" th:field="*{category}">
                        <option value="">Выберите категорию</option>
                        <option value="Пенсионер">Пенсионер</option>
                        <option value="Многодетная семья">Многодетная семья</option>
                        <option value="Социальный работник">Социальный работник / представитель</option>
                    </select>
                    <div class="error" th:errors="*{category}"></div>
                </div>
                <div>
                    <label for="rationId">Рацион</label>
                    <select id="rationId" th:field="*{rationId}">
                        <option value="">Выберите рацион</option>
                        <option th:each="ration : ${rations}" th:value="${ration.id}" th:text="${ration.name + (ration.period != null ? ' (' + ration.period + ')' : '')}"></option>
                    </select>
                    <div class="error" th:errors="*{rationId}"></div>
                </div>
            </div>

            <div class="single-field">
                <label for="address">Адрес получателя</label>
                <textarea id="address" th:field="*{address}"></textarea>
                <div class="error" th:errors="*{address}"></div>
            </div>

            <div class="form-grid">
                <div>
                    <label for="deliveryAddress">Адрес доставки (если отличается)</label>
                    <textarea id="deliveryAddress" th:field="*{deliveryAddress}"></textarea>
                </div>
                <div>
                    <label for="receiptChannel">Канал поступления</label>
                    <input type="text" id="receiptChannel" th:field="*{receiptChannel}" placeholder="сайт, телефон, соцсети">
                </div>
            </div>

            <div class="card-actions">
                <button class="btn btn-primary" type="submit">Отправить заявку</button>
                <a class="btn btn-secondary" th:href="@{/rations}">Назад к каталогу</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
