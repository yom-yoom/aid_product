<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Добавление рациона</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: siteHeader(${pageTitle})}"></div>
<main class="page-shell narrow-shell">
    <section class="form-card">
        <div class="page-head compact-head">
            <div>
                <h2>Новый рацион</h2>
                <p class="page-muted">Добавление продуктового набора в каталог.</p>
            </div>
        </div>

        <form th:action="@{/admin/rations}" th:object="${ration}" method="post">
            <div>
                <label for="name">Название</label>
                <input id="name" type="text" th:field="*{name}" required>
            </div>
            <div>
                <label for="period">Период</label>
                <input id="period" type="text" th:field="*{period}" placeholder="например: на 3 дня">
            </div>
            <div class="single-field">
                <label for="description">Описание</label>
                <textarea id="description" th:field="*{description}" required></textarea>
            </div>
            <div>
                <label for="active">
                    <input type="checkbox" id="active" th:field="*{active}">
                    Активен
                </label>
            </div>
            <div class="card-actions">
                <button class="btn btn-primary" type="submit">Сохранить</button>
                <a class="btn btn-secondary" th:href="@{/rations}">Назад к каталогу</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
