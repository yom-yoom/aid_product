<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Заявка отправлена</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: siteHeader(${pageTitle})}"></div>
<main class="page-shell narrow-shell">
    <section class="success-card">
        <span class="success-icon">✓</span>
        <h2>Заявка отправлена</h2>
        <p>Данные сохранены. Администратор сможет проверить заявку и назначить доставку.</p>
        <div class="card-actions centered-actions">
            <a class="btn btn-primary" th:href="@{/}">На главную</a>
            <a class="btn btn-secondary" th:href="@{/rations}">К каталогу рационов</a>
        </div>
    </section>
</main>
</body>
</html>
