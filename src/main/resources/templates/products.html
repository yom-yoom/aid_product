<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Продукты</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: siteHeader(${pageTitle})}"></div>

<main class="page-shell">
    <section class="page-head">
        <div><h2 th:text="${pageTitle}"></h2></div>
        <a href="/admin/products/new" class="btn btn-primary">+ Добавить продукт</a>
    </section>

    <div th:if="${products.isEmpty()}" class="empty-state">
        <p>Продукты не найдены</p>
    </div>

    <section class="table-card" th:unless="${products.isEmpty()}">
    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Единица измерения</th>
            <th>Статус</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.unitOfMeasurement}"></td>
            <td>
                <span th:if="${product.active}" class="badge badge-success">Активен</span>
                <span th:unless="${product.active}" class="badge badge-danger">Неактивен</span>
            </td>
            <td>
                <a th:href="@{/admin/products/{id}/edit(id=${product.id})}" class="btn btn-sm btn-info">Редактировать</a>
            </td>
        </tr>
        </tbody>
    </table>
    </section>
</main>
</body>
</html>
