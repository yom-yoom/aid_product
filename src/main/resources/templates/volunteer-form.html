<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Волонтёр</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: siteHeader(${pageTitle})}"></div>

<main class="page-shell narrow-shell">
    <section class="form-card">
        <div class="page-head compact-head"><div><h2 th:text="${pageTitle}"></h2></div></div>
        <form method="post" th:object="${volunteer}">
            <div class="form-group">
                <label for="fullName">ФИО волонтёра</label>
                <input type="text" id="fullName" th:field="*{fullName}" required>
            </div>
            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" th:field="*{phone}" required>
            </div>
            <div class="form-group">
                <label for="transportType">Тип транспорта</label>
                <select id="transportType" th:field="*{transportType}">
                    <option value="">-- Выберите тип транспорта --</option>
                    <option th:each="type : ${transportTypes}" th:value="${type}" th:text="${type}"></option>
                </select>
            </div>
            <div class="form-group">
                <label for="availabilityStatus">Статус доступности</label>
                <select id="availabilityStatus" th:field="*{availabilityStatus}">
                    <option value="">-- Выберите статус --</option>
                    <option th:each="status : ${availabilityStatuses}" th:value="${status}" th:text="${status}"></option>
                </select>
            </div>
            <div class="card-actions">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/admin/volunteers" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
