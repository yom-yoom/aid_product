<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Продукт</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: siteHeader(${pageTitle})}"></div>

<main class="page-shell narrow-shell">
    <section class="form-card">
        <div class="page-head compact-head"><div><h2 th:text="${pageTitle}">Продукт</h2></div></div>
        <form method="post" th:object="${product}">
            <div class="form-group">
                <label for="name">Название продукта</label>
                <input type="text" id="name" th:field="*{name}" required>
            </div>
            <div class="form-group">
                <label for="unitOfMeasurement">Единица измерения</label>
                <input type="text" id="unitOfMeasurement" th:field="*{unitOfMeasurement}" placeholder="кг, шт., л, уп." required>
            </div>
            <div class="form-group">
                <label for="active"><input type="checkbox" id="active" th:field="*{active}"> Активен</label>
            </div>
            <div class="card-actions">
                <button type="submit" class="btn btn-primary">Сохранить</button>
                <a href="/admin/products" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
